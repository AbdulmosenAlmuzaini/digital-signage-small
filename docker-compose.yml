version: '3.8'

services:
  app:
    build: .
    container_name: signage_app
    ports:
      - "8081:80"
    volumes:
      - ./signage:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: signage_db
      DB_USER: signage_user
      DB_PASS: signage_pass
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: signage_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: signage_db
      MYSQL_USER: signage_user
      MYSQL_PASSWORD: signage_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./signage/db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  db_data:
